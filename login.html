<body>

  <header>
    <div class="logo">StudentHub</div>
    <nav>
      <ul>
       <li><a href="login.html">Login</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>

      </ul>
    </nav>
  </header>

  <main>
    <h1>Login</h1>
    <p>Enter your details below to access your dashboard.</p>

    <form action="dashboard.html" method="get">
      <label for="userId">Student / Faculty ID</label>
      <input type="text" id="userId" name="userId" placeholder="e.g. 25CS001" required>

      <li></li><label for="password">Password</label>
      <input type="password" id="password" name="password" required></li>

      <label for="role">Login as</label>
      <select id="role" name="role">
        <option value="student">Student</option>
        <option value="faculty">Faculty</option>
        <option value="admin">Admin</option>
      </select>

      <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="register.html">Register here</a></p>
  </main>

  <footer>
    <p>&copy; 2026 StudentHub | CHARUSAT</p>
  </footer>

</body>
</html>
